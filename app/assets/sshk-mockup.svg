<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" rx="12" fill="#f0f0f3"/>
  <!-- Terminal window -->
  <rect x="80" y="50" width="640" height="350" rx="10" fill="#1a1a2e" stroke="#2d2d44" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="80" y="50" width="640" height="32" rx="10" fill="#232340"/>
  <rect x="80" y="72" width="640" height="10" fill="#232340"/>
  <circle cx="102" cy="66" r="5.5" fill="#ff5f57"/>
  <circle cx="120" cy="66" r="5.5" fill="#febc2e"/>
  <circle cx="138" cy="66" r="5.5" fill="#28c840"/>
  <text x="400" y="70" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#8888aa">sshk — bash</text>
  <!-- Terminal content -->
  <text x="104" y="110" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#28c840">$</text>
  <text x="120" y="110" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#e0e0e8">sshk create my-server --type ed25519</text>
  <text x="104" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#6bc5f7">✓ Key generated: ~/.ssh/my-server_ed25519</text>
  <text x="104" y="158" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#6bc5f7">✓ Public key copied to clipboard</text>
  <text x="104" y="194" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#28c840">$</text>
  <text x="120" y="194" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#e0e0e8">sshk list</text>
  <text x="104" y="218" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#8888aa">NAME              TYPE        CREATED</text>
  <text x="104" y="240" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#e0e0e8">my-server         ed25519     2026-06-11</text>
  <text x="104" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#e0e0e8">github-deploy     rsa-4096    2026-05-28</text>
  <text x="104" y="284" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#e0e0e8">vps-backup        ed25519     2026-04-15</text>
  <text x="104" y="320" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#28c840">$</text>
  <text x="120" y="320" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#e0e0e8">sshk grant my-server user@10.0.0.5</text>
  <text x="104" y="344" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#6bc5f7">✓ Access granted to user@10.0.0.5</text>
  <text x="104" y="368" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#6bc5f7">✓ Audit log updated</text>
  <!-- Cursor blink -->
  <rect x="104" y="384" width="8" height="16" rx="1" fill="#28c840" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
